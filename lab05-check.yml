name: Lab 05 - Compose Readiness Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  compose-check:
    name: Validate Docker Compose Stack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout source
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Cài Node.js + Newman để chạy Postman test
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman + HTML reporter
        run: npm install -g newman newman-reporter-htmlextra

      # 3. Tạo .env từ .env.example (không dùng secret thật)
      - name: Create .env from example
        run: cp .env.example .env

      # 4. Lint docker-compose.yml (kiểm tra cú pháp)
      - name: Lint docker-compose.yml
        run: docker compose config --quiet

      # 5. Build & start stack, đợi healthcheck pass (--wait)
      - name: Build and start Compose stack
        run: docker compose up -d --build --wait

      - name: Show running containers
        run: docker compose ps

      # 6. Smoke test các endpoint /health
      - name: Test API /health (port 8000)
        run: |
          for i in 1 2 3 4 5; do
            curl -fsS http://localhost:8000/health && exit 0
            echo "Retry $i..."; sleep 5
          done
          docker compose logs api
          exit 1

      - name: Test AI service /health (port 9000)
        run: |
          for i in 1 2 3 4 5; do
            curl -fsS http://localhost:9000/health && exit 0
            echo "Retry $i..."; sleep 5
          done
          docker compose logs ai-service
          exit 1

      - name: Test DB readiness (pg_isready)
        run: |
          sed -i 's/\r$//' .env
          set -a; source .env; set +a
          docker compose exec -T db pg_isready -U "$POSTGRES_USER"

      # 7. Chạy Newman test nếu có collection
      - name: Run Newman collection
        run: |
          mkdir -p reports
          COLLECTION=$(find postman -maxdepth 3 -name "*.postman_collection.json" | head -n 1)
          ENVIRONMENT=$(find postman/environments -maxdepth 2 -name "*.postman_environment.json" | head -n 1)

          if [ -z "$COLLECTION" ]; then
            echo "::warning::Không tìm thấy Postman collection trong postman/ - bỏ qua bước Newman"
            exit 0
          fi

          echo "Collection: $COLLECTION"
          [ -n "$ENVIRONMENT" ] && echo "Environment: $ENVIRONMENT"

          newman run "$COLLECTION" \
            ${ENVIRONMENT:+-e "$ENVIRONMENT"} \
            -r cli,junit,htmlextra \
            --reporter-junit-export reports/newman-lab05-compose.xml \
            --reporter-htmlextra-export reports/newman-lab05-compose.html

      # 8. Kiểm tra readiness checklist (yêu cầu tối thiểu 6 mục đã tick)
      - name: Verify readiness checklist
        run: |
          CHECKLIST="checklists/readiness-checklist.md"
          if [ ! -f "$CHECKLIST" ]; then
            echo "::error::Thiếu file $CHECKLIST"
            exit 1
          fi

          TOTAL=$(grep -cE '^[[:space:]]*-[[:space:]]*\[[ xX]\]' "$CHECKLIST" || true)
          CHECKED=$(grep -cE '^[[:space:]]*-[[:space:]]*\[[xX]\]' "$CHECKLIST" || true)

          echo "Readiness checklist: ${CHECKED:-0}/${TOTAL:-0} mục đã tick"

          if [ "${CHECKED:-0}" -lt 6 ]; then
            echo "::error::Lab yêu cầu tối thiểu 6 mục readiness, hiện có ${CHECKED:-0}"
            exit 1
          fi

      # 9. Upload report làm artifact để tải về
      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
          if-no-files-found: warn

      # 10. Dump log khi fail để debug
      - name: Dump Compose logs on failure
        if: failure()
        run: docker compose logs

      # 11. Cleanup
      - name: Tear down Compose stack
        if: always()
        run: docker compose down -v
